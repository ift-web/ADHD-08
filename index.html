/* ========== 音效 ========== */
let globalAudioCtx = null;
const initAudio = () => { try { if(!globalAudioCtx){ const A=window.AudioContext||window.webkitAudioContext; if(A) globalAudioCtx=new A(); } if((globalAudioCtx&&globalAudioCtx.state)===‘suspended’) globalAudioCtx.resume(); } catch(e){} };

const playSound = (type=‘alarm’) => {
if(!globalAudioCtx) return;
try {
const now=globalAudioCtx.currentTime;
const t=(freq,start,dur,vol=0.4)=>{
const o=globalAudioCtx.createOscillator(),g=globalAudioCtx.createGain();
o.connect(g);g.connect(globalAudioCtx.destination);
o.type=‘sine’;o.frequency.value=freq;
g.gain.setValueAtTime(0,start);g.gain.linearRampToValueAtTime(vol,start+0.04);g.gain.linearRampToValueAtTime(0,start+dur);
o.start(start);o.stop(start+dur);
};
if(type===‘alarm’){ t(880,now,0.2);t(880,now+0.3,0.2);t(1046,now+0.6,0.4); }
else if(type===‘complete’){ t(523,now,0.15,0.3);t(659,now+0.12,0.15,0.3);t(784,now+0.24,0.3,0.3); }
else if(type===‘tick’){ t(660,now,0.08,0.15); }
else if(type===‘milestone’||type===‘badge’){ t(523,now,0.12,0.3);t(659,now+0.1,0.12,0.3);t(784,now+0.2,0.12,0.3);t(1046,now+0.35,0.4,0.35); }
else if(type===‘sakura’){ t(523,now,0.3,0.15);t(392,now+0.2,0.4,0.12);t(330,now+0.5,0.5,0.08); }
else if(type===‘meow’){ t(600,now,0.15,0.2);t(700,now+0.1,0.1,0.25);t(500,now+0.2,0.2,0.15); }
else if(type===‘breathe’){ t(396,now,0.6,0.15); }
} catch(e){}
};

/* ========== 環境音生成 ========== */
let ambientNodes = [];
const stopAmbient = () => { ambientNodes.forEach(n=>{try{n.stop&&n.stop();n.disconnect&&n.disconnect();}catch(e){}}); if(ambientNodes._timer) clearTimeout(ambientNodes._timer); ambientNodes=[]; };
const playAmbient = (id) => {
stopAmbient(); if(!globalAudioCtx||id===‘none’) return;
try {
const ctx=globalAudioCtx;
if(id===‘rain’||id===‘forest’){
const sz=2*ctx.sampleRate, buf=ctx.createBuffer(1,sz,ctx.sampleRate), d=buf.getChannelData(0);
let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
for(let i=0;i<sz;i++){const w=Math.random()*2-1;b0=0.99886*b0+w*0.0555179;b1=0.99332*b1+w*0.0750759;b2=0.96900*b2+w*0.1538520;b3=0.86650*b3+w*0.3104856;b4=0.55000*b4+w*0.5329522;b5=-0.7616*b5-w*0.0168980;d[i]=(b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.028;b6=w*0.115926;}
const s=ctx.createBufferSource();s.buffer=buf;s.loop=true;
const g=ctx.createGain();g.gain.value=id===‘rain’?0.35:0.25;
const f=ctx.createBiquadFilter();f.type=‘lowpass’;f.frequency.value=id===‘rain’?800:400;
s.connect(f);f.connect(g);g.connect(ctx.destination);s.start();ambientNodes.push(s,g,f);
} else if(id===‘cafe’){
const sz=2*ctx.sampleRate,buf=ctx.createBuffer(1,sz,ctx.sampleRate),d=buf.getChannelData(0);let prev=0;
for(let i=0;i<sz;i++){prev=(prev+(0.02*(Math.random()*2-1)))/1.02;d[i]=prev*3.5;}
const s=ctx.createBufferSource();s.buffer=buf;s.loop=true;const g=ctx.createGain();g.gain.value=0.2;
const f=ctx.createBiquadFilter();f.type=‘lowpass’;f.frequency.value=500;
s.connect(f);f.connect(g);g.connect(ctx.destination);s.start();ambientNodes.push(s,g,f);
} else if(id===‘lofi’){
const chords=[[261,329,392],[293,349,440],[329,392,493],[261,329,392]];let ci=0;
const play=()=>{if(ambientNodes.length===0&&ci>0)return;const ch=chords[ci%chords.length];
ch.forEach(fr=>{const o=ctx.createOscillator(),g=ctx.createGain();o.type=‘triangle’;o.frequency.value=fr;
g.gain.setValueAtTime(0,ctx.currentTime);g.gain.linearRampToValueAtTime(0.06,ctx.currentTime+0.3);g.gain.linearRampToValueAtTime(0,ctx.currentTime+2.8);
o.connect(g);g.connect(ctx.destination);o.start();o.stop(ctx.currentTime+3);});ci++;ambientNodes._timer=setTimeout(play,3000);};
play();ambientNodes.push({stop:()=>clearTimeout(ambientNodes._timer),disconnect:()=>{}});
} else if(id===‘fire’){
const sz=2*ctx.sampleRate,buf=ctx.createBuffer(1,sz,ctx.sampleRate),d=buf.getChannelData(0);let prev=0;
for(let i=0;i<sz;i++){prev=(prev+(0.05*(Math.random()*2-1)))/1.05;d[i]=prev*4+Math.sin(i/200)*0.02;}
const s=ctx.createBufferSource();s.buffer=buf;s.loop=true;const g=ctx.createGain();g.gain.value=0.3;
const f=ctx.createBiquadFilter();f.type=‘bandpass’;f.frequency.value=300;f.Q.value=0.5;
s.connect(f);f.connect(g);g.connect(ctx.destination);s.start();ambientNodes.push(s,g,f);
}
} catch(e){}
};

const calcStreak=(history)=>{
const dates=Object.keys(history).filter(d=>history[d]>0).sort().reverse();
if(dates.length===0)return 0;let streak=0;const today=new Date();today.setHours(0,0,0,0);
for(let i=0;i<dates.length;i++){const[y,m,d]=dates[i].split(’-’).map(Number);const check=new Date(y,m-1,d);check.setHours(0,0,0,0);
const diff=Math.round((today-check)/86400000);if(diff===i||diff===i+1)streak++;else break;}return streak;
};

const BreathingExercise=({pattern,onClose,onComplete})=>{
const[phase,setPhase]=useState(“ready”);const[secondsLeft,setSecondsLeft]=useState(3);const[cycleCount,setCycleCount]=useState(0);
useEffect(()=>{
if(phase===“ready”){if(secondsLeft<=0){setPhase(“in”);setSecondsLeft(pattern.inSec);return;}const t=setTimeout(()=>setSecondsLeft(s=>s-1),1000);return()=>clearTimeout(t);}
if(phase===“done”)return;
if(secondsLeft<=0){
if(phase===“in”){if(pattern.holdSec>0){setPhase(“hold”);setSecondsLeft(pattern.holdSec);}else{setPhase(“out”);setSecondsLeft(pattern.outSec);}}
else if(phase===“hold”){setPhase(“out”);setSecondsLeft(pattern.outSec);}
else if(phase===“out”){if(pattern.hold2Sec>0){setPhase(“hold2”);setSecondsLeft(pattern.hold2Sec);}else{const next=cycleCount+1;if(next>=pattern.cycles){setPhase(“done”);playSound(‘complete’);onComplete&&onComplete();}else{setCycleCount(next);setPhase(“in”);setSecondsLeft(pattern.inSec);}}}
else if(phase===“hold2”){const next=cycleCount+1;if(next>=pattern.cycles){setPhase(“done”);playSound(‘complete’);onComplete&&onComplete();}else{setCycleCount(next);setPhase(“in”);setSecondsLeft(pattern.inSec);}}
return;}
const t=setTimeout(()=>setSecondsLeft(s=>s-1),1000);return()=>clearTimeout(t);
},[phase,secondsLeft]);
const phaseLabel={ready:“準備好了嗎？”,in:“吸氣”,hold:“屏住”,out:“吐氣”,hold2:“屏住”,done:“做得好！”};
const phaseColor={ready:P.sub,in:P.green,hold:P.orange,out:P.accent,hold2:P.orange,done:P.green};
const phaseAnim=phase===“in”?“breatheIn”:phase===“out”?“breatheOut”:“breatheHold”;
const phaseDur=phase===“in”?pattern.inSec:phase===“hold”?pattern.holdSec:phase===“out”?pattern.outSec:phase===“hold2”?pattern.hold2Sec:1;
return(<div style={{…st.app,display:“flex”,flexDirection:“column”,alignItems:“center”,justifyContent:“center”,background:`linear-gradient(180deg, #e8f2ec 0%, ${P.bg} 100%)`,padding:24}}>

<div style={{width:120,height:120,borderRadius:“50%”,background:`${phaseColor[phase]}20`,border:`3px solid ${phaseColor[phase]}`,display:“flex”,alignItems:“center”,justifyContent:“center”,flexDirection:“column”}}>
{phase!==“done”?<div style={{fontSize:36,fontWeight:900,color:phaseColor[phase],fontFamily:“monospace”}}>{secondsLeft}</div>:<div style={{fontSize:40}}>🧘</div>}
</div></div>

useEffect(()=>{const interval=setInterval(()=>{setActiveTimer(prev=>{if(!prev||!prev.isRunning||prev.isFinished)return prev;const cs=prev.template.steps[prev.stepIndex];if(cs.duration===0)return prev;

const checkBadges=useCallback(ud=>{
const totalCompleted=ud.totalCompleted||Object.values(ud.completedHistory||{}).reduce((a,b)=>a+b,0);
const streak=calcStreak(ud.completedHistory||{});
const stats={totalCompleted,streak,forgiveCount:ud.forgiveCount||0,focusCompleted:ud.focusCompleted||0,petHappiness:ud.petHappiness||0,breatheCompleted:ud.breatheCompleted||0};
const unlocked=ud.unlockedBadges||[];
for(const badge of BADGES){if(!unlocked.includes(badge.id)&&badge.check(stats)){initAudio();playSound(‘badge’);setNewBadge(badge);return{…ud,unlockedBadges:[…unlocked,badge.id]};}}return ud;},[]);

const upd=p=>setData(d=>{const next={…d,…p};return checkBadges(next);});

const prepStart=()=>{if(!data.leaveTime)return null;const[h,m]=data.leaveTime.split(”:”).map(Number);const t=((h*60+m-(data.prepMinutes||0))%1440+1440)%1440;return`${String(Math.floor(t/60)).padStart(2,"0")}:${String(t%60).padStart(2,"0")}`;};
const minsToLeave=()=>{if(!data.leaveTime)return null;const[h,m]=data.leaveTime.split(”:”).map(Number);return h*60+m-(now.getHours()*60+now.getMinutes());};
const leaveCD=()=>{const d=minsToLeave();if(d===null)return null;if(d<0)return”已出發 ✓”;if(d===0)return”現在出門！”;return d>=60?`${Math.floor(d/60)} 小時 ${d%60} 分後出門`:`${d} 分鐘後出門`;};
const prepCD=()=>{const ps=prepStart();if(!ps)return null;const[ph,pm]=ps.split(”:”).map(Number);const diff=ph*60+pm-(now.getHours()*60+now.getMinutes());const mtl=minsToLeave();if(diff<=0&&mtl!==null&&mtl>0)return”🔔 現在開始準備！”;if(diff>0)return`${diff} 分鐘後開始準備`;return null;};

const today=todayStr(),hist={…data.completedHistory};hist[today]=(hist[today]||0)+1;

const newCT=[…data.completedToday,{text:(item&&item.text),time:new Date().toLocaleTimeString(“zh-TW”,{hour:“2-digit”,minute:“2-digit”})}];

upd({…base,milestoneSeen:[…(data.milestoneSeen||[]),`${today}_${todayCount}`]});
} else {
upd(base);
}
};

};

else{if(!newAlarm.interval||!newAlarm.start||!newAlarm.end)return;let[sh,sm]=newAlarm.start.split(’:’).map(Number),[eh,em]=newAlarm.end.split(’:’).map(Number);let cur=sh*60+sm,end=eh*60+em,int=Math.max(0.5,Number(newAlarm.interval))*60;
while(cur<=end){let ts=`${String(Math.floor(cur/60)).padStart(2,'0')}:${String(cur%60).padStart(2,'0')}`;if(!na.some(a=>a.label===newAlarm.label&&a.time===ts))na.push({id:genId(),label:newAlarm.label,time:ts,enabled:true});cur+=int;}}
upd({alarms:na});setNewAlarm({label:””,type:“fixed”,time:””,interval:1,start:“09:00”,end:“21:00”});};

while(cur<=end){let ts=`${String(Math.floor(cur/60)).padStart(2,'0')}:${String(cur%60).padStart(2,'0')}`;if(!na.some(a=>a.label===preset.label&&a.time===ts))na.push({id:genId(),label:preset.label,time:ts,enabled:true});cur+=int;}}
upd({alarms:na});};

const focusMoveStep=(idx,dir)=>{const steps=[…focusDraft.steps];if(dir===-1&&idx>0)[steps[idx-1],steps[idx]]=[steps[idx],steps[idx-1]];else if(dir===1&&idx<steps.length-1)[steps[idx],steps[idx+1]]=[steps[idx+1],steps[idx]];setFocusDraft({…focusDraft,steps});};

if(type===‘min’)steps[idx].duration=v*60+cS;else if(type===‘sec’){if(v>59)v=59;steps[idx].duration=cM*60+v;}else if(type===‘text’)steps[idx].text=value;setFocusDraft({…focusDraft,steps});};
const getFocusTotalTime=()=>((focusDraft&&focusDraft.steps)||[]).reduce((s,x)=>s+(parseInt(x.duration)||0),0)||0;

<div style={{fontSize:13,color:P.sub,marginTop:8,opacity:0.7}}>共 {timerCountdown.template.steps.length} 步驟</div></div>);
